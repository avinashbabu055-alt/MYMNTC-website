<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course Enrollment</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
}

.enroll-box {
    background: rgba(15, 23, 42, 0.95);
    padding: 35px;
    border-radius: 16px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

.enroll-box h2 {
    text-align: center;
    margin-bottom: 20px;
    background: linear-gradient(to right, #22d3ee, #6366f1);
    -webkit-background-clip: text;
    color: transparent;
}

label {
    display: block;
    margin-top: 12px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 8px;
    border: none;
}

button {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    border-radius: 25px;
    border: none;
    background: linear-gradient(to right, #22d3ee, #6366f1);
    color: #020617;
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="enroll-box">
    <h2>Enroll Now</h2>

    <form onsubmit="submitForm(event)"action="submit.php" method="POST">
>
        <label>Full Name</label>
        <input type="text" name="full_name="required>

        <label>Email</label>
        <input type="email" name="email"required>

        <label>Phone Number</label>
        <input type="tel" name="phone" required>

        <label>Class</label>
        <select required>
            <option value="">Select Class</option>
            <option>8th</option>
            <option>9th</option>
            <option>10th</option>
            <option>11th</option>
            <option>12th</option>
            <option>College</option>
        </select>

        <label>Subject</label>
        <input type="text" id="subject" name="subject" readonly>

        <button type="submit">Enroll</button>
    </form>
</div>

<script>
const params = new URLSearchParams(window.location.search);
document.getElementById("subject").value = params.get("subject") || "";

function submitForm(e) {
    e.preventDefault();
    alert("Enrollment successful! We will contact you soon.");
}
</script>

</body>
</html>
