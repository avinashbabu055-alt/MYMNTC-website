        /* Add the MNTC name tag styling */
        .mntc-tag {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 1.2em;
            font-weight: bold;
            z-index: 1000;
            backdrop-filter: blur(5px);
            animation: fadeIn 2s ease-in-out;
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* Rest of your existing styles */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Arial', sans-serif;
            overflow: auto;
            background: linear-gradient(270deg, #ff7e5f, #feb47b, #00c6ff, #00f99f);
        }

        .animated-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: 300px 300px;
            animation: gradientAnimation 5s ease infinite;
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding-top: 20px;
        }

        nav ul {
            list-style: none;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        nav ul li {
            margin: 0 15px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-size: 1.2em;
            transition: color 0.3s, transform 0.3s;
        }

        nav ul li a:hover {
            color: #ff6347;
            transform: scale(1.1);
        }

        .category {
            width: 80%;
            font-family: 'Arial', sans-serif;
            text-transform: uppercase;
            color: black;
            margin: 20px 0;
        }

        .category h3 {
            color: white;
        }

        .movie-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .movie {
            background-color: rgba(0, 0, 0, 0.8);
            border-radius: 10px;
            margin: 10px;
            padding: 15px;
            width: 200px;
            transition: transform 0.3s;
            text-align: center;
        }

        .movie img {
            width: 100%;
            border-radius: 10px;
        }

        .movie h3 {
            margin: 10px 0;
            font-size: 1.2em;
        }

        .movie p {
            font-size: 0.9em;
        }

        .movie:hover {
            transform: scale(1.1);
        }

        .movie button {
            background: linear-gradient(135deg, #330867, #30cfd0);
            border: none;
            padding: 10px;
            color: white;
            font-size: 1em;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.3s;
            width: 100%;
            border-radius: 5px;
            margin-top: 10px;
        }

        .movie button:hover {
            background-color: #ff4500;
            transform: scale(1.1);
            animation: buttonAnim 3s;
        }

        @keyframes buttonAnim {
            0% { background-color: #ff6347; }
            50% { background-color: #ff4500; }
            100% { background-color: #ff6347; }
        }
    </style>
